<script>
(function () {
  var TIMEOUT_MS = 4000;

  // Shared readiness contract other scripts await.
  var resolveReady;
  window.statsigReady = new Promise(function (res) { resolveReady = res; });
  window.__nourishStatsig = window.__nourishStatsig || {};
  window.__nourishStatsig.sidecarExperimentIds = window.__nourishStatsig.sidecarExperimentIds || [];

  window.__statsigReveal = function (reason) {
    if (window.__statsigRevealed) return;
    window.__statsigRevealed = true;
    resolveReady(reason || "unknown");
  };

  // statsig-sidecar@2.0.12 calls this after runAllExperiments.
  var previousPostExperimentCallback = window.postExperimentCallback;
  window.postExperimentCallback = function (statsigInstance, expIds) {
    window.__nourishStatsig.sidecarExperimentIds = expIds || [];
    try {
      if (typeof previousPostExperimentCallback === "function") {
        previousPostExperimentCallback(statsigInstance, expIds);
      }
    } catch (error) {
      console.error("[Statsig] postExperimentCallback failed", error);
    }
    window.__statsigReveal("statsig");
  };

  // Hard fallback so dependent scripts never wait forever on a blocked SDK.
  setTimeout(function () { window.__statsigReveal("timeout"); }, TIMEOUT_MS);
})();
</script>
