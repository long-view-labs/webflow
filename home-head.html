        }
      },
      {
        "@type": "Question",
        "name": "Are dietitians the same thing as nutritionists?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. The title 'nutritionist' is not protected, meaning anyone can use it. All Nourish providers are Registered Dietitian Nutritionists (RDN), a legally protected title requiring a Bachelor or Master's degree in Nutrition, a national exam, and ongoing continuing education."
        }
      },
      {
        "@type": "Question",
        "name": "Will my insurance cover my sessions?",
        "acceptedAnswer": {
          "@type": "Answer",

        }
      },
      {
        "@type": "Question",
        "name": "How many appointments will I need?",
        "acceptedAnswer": {
          "@type": "Answer",

        "name": "Do providers at Nourish work with children?",
