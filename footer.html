<script>
  (function () {
    var scriptsLoaded = false;
    var loadedScripts = {};

    function loadScript(src, callback) {
      if (!src) return;

      if (loadedScripts[src]) {
        if (typeof callback === "function") callback();
        return;
      }

      var existing = document.querySelector('script[src="' + src + '"]');
      if (existing) {
        loadedScripts[src] = true;
        if (typeof callback === "function") {
          if (existing.hasAttribute("data-loaded")) callback();
          else existing.addEventListener("load", callback, { once: true });
        }
        return;
      }

      var script = document.createElement("script");
      script.src = src;
      script.async = true;
      script.onload = function () {
        loadedScripts[src] = true;
        script.setAttribute("data-loaded", "true");
        if (typeof callback === "function") callback();
      };
      document.body.appendChild(script);
    }

    function updateCopyrightYear() {
      var year = new Date().getFullYear();
      document.querySelectorAll("#copyright").forEach(function (element) {
        element.textContent = "© " + year;
      });
    }

    function loadScriptsOnInteraction() {
      if (scriptsLoaded) return;
      scriptsLoaded = true;

      updateCopyrightYear();

      loadScript("https://cdn.jsdelivr.net/gh/long-view-labs/webflow@v2.620.8/timed-tabs.js");
      loadScript("https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js");
    }

    function loadNavbarScripts() {
      loadScript("https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js", function () {
        loadScript("https://cdn.jsdelivr.net/gh/long-view-labs/webflow@v2.620.9/navbar.js");
      });
    }

    updateCopyrightYear();
    loadNavbarScripts();
    $(window).one("scroll touchstart mousemove", loadScriptsOnInteraction);
  })();
</script>

<script>
  //Osano consent listener
  (function () {
    // Prevent double-initialization
    if (window._osanoListenerInit) return;

    var OSANO_CONSENT_CATEGORIES = ["MARKETING"];

    // Reads current Osano consent state and syncs it to Rudderstack.
    // After this runs, all subsequent track/page calls will include
    // consentManagement in their context payload automatically.
    function updateRudderstackConsent() {
      if (!window.Osano?.cm?.getConsent) return;
      if (typeof rudderanalytics?.consent !== "function") return;

      var osanoConsent = window.Osano.cm.getConsent();
      var allowedConsentIds = [];
      var deniedConsentIds = [];

      OSANO_CONSENT_CATEGORIES.forEach(function (category) {
        var status = osanoConsent[category];
        if (status === "ACCEPT") allowedConsentIds.push(category);
        else if (status === "DENY") deniedConsentIds.push(category);
        // If neither, user hasn't made a choice yet — omit from both arrays
      });

      rudderanalytics.consent({
        consentManagement: {
          enabled: true,
          provider: "custom", // Osano isn't a built-in Rudderstack provider
          allowedConsentIds: allowedConsentIds,
          deniedConsentIds: deniedConsentIds,
        },
      });
    }

    // Attaches listeners and fires an initial sync.
    // osano-cm-initialized: fires on page load with stored consent state
    // osano-cm-consent-saved: fires when user updates preferences via the cookie widget
    function setupListeners() {
      if (!window.Osano?.cm) return false;
      if (typeof rudderanalytics?.consent !== "function") return false;

      window.Osano.cm.addEventListener(
        "osano-cm-initialized",
        updateRudderstackConsent,
      );
      window.Osano.cm.addEventListener(
        "osano-cm-consent-saved",
        updateRudderstackConsent,
      );

      updateRudderstackConsent();
      return true;
    }

    // Both Osano and Rudderstack load async — poll until both are ready.
    // Gives up after 10s (20 attempts × 500ms).
    var attempts = 0;
    var checkInterval = setInterval(function () {
      attempts++;
      if (setupListeners() || attempts >= 20) {
        if (attempts >= 20) console.warn("[Osano] Consent init timed out");
        else window._osanoListenerInit = true;
        clearInterval(checkInterval);
      }
    }, 500);
  })();
</script>
